<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCI Foundations Vol.2</title>
<style>
  :root {
    --red:   #CC0000;
    --navy:  #1F3864;
    --white: #FFFFFF;
    --bg:    #F5F6FA;
    --card:  #FFFFFF;
    --text:  #1A1A2E;
    --sub:   #555577;
    --border:#D0D5DD;
    --green: #1A7A3A;
    --amber: #C8680A;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Meiryo UI", "Yu Gothic UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--navy);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    color: var(--red);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -1px;
  }
  .header-title {
    color: var(--white);
    font-size: 14px;
    font-weight: 600;
    opacity: 0.9;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .badge-cat {
    background: rgba(255,255,255,0.15);
    color: var(--white);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .progress-text {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    min-width: 60px;
    text-align: right;
  }

  /* ===== MAIN LAYOUT ===== */
  .main { max-width: 860px; margin: 0 auto; padding: 20px 16px 80px; }

  /* ===== START SCREEN ===== */
  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;
    text-align: center;
  }
  .start-icon {
    font-size: 56px;
    margin-bottom: 20px;
  }
  .start-screen h1 {
    font-size: 24px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .start-screen p {
    color: var(--sub);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 32px;
  }
  .cat-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .cat-card:hover, .cat-card.selected {
    border-color: var(--red);
    background: #FFF5F5;
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .cat-card.selected { border-width: 2px; }
  .cat-card .cat-icon { font-size: 26px; margin-bottom: 6px; }
  .cat-card .cat-name { font-size: 13px; font-weight: 700; color: var(--navy); }
  .cat-card .cat-count { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .mode-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--card);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--sub);
  }
  .mode-btn:hover, .mode-btn.selected {
    border-color: var(--navy);
    background: var(--navy);
    color: var(--white);
  }

  /* ===== PROGRESS BAR ===== */
  .prog-bar-wrap {
    background: #E0E4F0;
    border-radius: 4px;
    height: 5px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%;
    background: var(--red);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  /* ===== QUESTION CARD ===== */
  .q-card {
    background: var(--card);
    border-radius: 14px;
    padding: 28px 28px 22px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .q-num {
    background: var(--red);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .q-cat-tag {
    background: #EEF1FB;
    color: var(--navy);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .q-select-hint {
    font-size: 11px;
    color: var(--amber);
    font-weight: 700;
    margin-left: auto;
    white-space: nowrap;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 22px;
    white-space: pre-wrap;
  }

  /* ===== OPTIONS ===== */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    background: var(--card);
    text-align: left;
    width: 100%;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--navy);
    background: #F0F3FF;
  }
  .opt:disabled { cursor: default; }
  .opt-key {
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--sub);
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    padding-top: 3px;
  }
  /* selected (before answer) */
  .opt.checked {
    border-color: var(--navy);
    background: #EEF2FF;
  }
  .opt.checked .opt-key {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }
  /* correct */
  .opt.correct {
    border-color: var(--green);
    background: #EDFAF0;
  }
  .opt.correct .opt-key {
    background: var(--green);
    border-color: var(--green);
    color: var(--white);
  }
  /* wrong */
  .opt.wrong {
    border-color: var(--red);
    background: #FFF0F0;
  }
  .opt.wrong .opt-key {
    background: var(--red);
    border-color: var(--red);
    color: var(--white);
  }
  /* correct answer highlight (when user was wrong) */
  .opt.answer-highlight {
    border-color: var(--green);
    background: #EDFAF0;
    border-style: dashed;
  }
  .opt.answer-highlight .opt-key {
    background: var(--green);
    border-color: var(--green);
    color: var(--white);
  }

  /* ===== EXPLANATION ===== */
  .explanation {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 10px;
    border-left: 4px solid var(--navy);
    background: #F0F3FF;
    font-size: 13px;
    line-height: 1.7;
    color: var(--sub);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--navy); display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ===== RESULT BADGE ===== */
  .result-badge {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
  }
  .result-badge.show { display: flex; }
  .result-badge.ok { background: #EDFAF0; color: var(--green); }
  .result-badge.ng { background: #FFF0F0; color: var(--red); }

  /* ===== ACTION BUTTONS ===== */
  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--red);
    color: var(--white);
  }
  .btn-primary:hover { background: #AA0000; transform: translateY(-1px); }
  .btn-primary:disabled { background: #CCC; cursor: default; transform: none; }
  .btn-secondary {
    background: var(--card);
    color: var(--navy);
    border: 2px solid var(--navy);
  }
  .btn-secondary:hover { background: var(--navy); color: var(--white); }
  .btn-ghost {
    background: transparent;
    color: var(--sub);
    border: 2px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--sub); }

  /* ===== SCORE SCREEN ===== */
  .score-screen {
    background: var(--card);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 8px solid var(--border);
    position: relative;
  }
  .score-ring.pass { border-color: var(--green); }
  .score-ring.fail { border-color: var(--red); }
  .score-pct {
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
  }
  .score-ring.pass .score-pct { color: var(--green); }
  .score-ring.fail .score-pct { color: var(--red); }
  .score-label { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .score-screen h2 { font-size: 20px; font-weight: 900; color: var(--navy); margin-bottom: 8px; }
  .score-screen p { font-size: 14px; color: var(--sub); margin-bottom: 24px; line-height: 1.6; }
  .cat-scores {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin: 20px 0 28px;
  }
  .cat-score-card {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    text-align: left;
    border: 1px solid var(--border);
  }
  .cat-score-card .cat-s-name { font-size: 12px; color: var(--sub); font-weight: 700; margin-bottom: 4px; }
  .cat-score-card .cat-s-val { font-size: 20px; font-weight: 900; color: var(--navy); }
  .cat-score-card .cat-s-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .cat-score-card .cat-s-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }

  .wrong-list { text-align: left; margin-top: 16px; }
  .wrong-list h3 { font-size: 14px; color: var(--red); margin-bottom: 10px; font-weight: 700; }
  .wrong-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #FFF0F0;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .wrong-item .wi-num { font-weight: 700; color: var(--red); min-width: 28px; }
  .wrong-item .wi-q { color: var(--text); flex: 1; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .q-card { padding: 18px 16px; }
    .q-text { font-size: 14px; }
    .opt-text { font-size: 13px; }
    .score-screen { padding: 28px 18px; }
    .btn { padding: 10px 16px; font-size: 13px; }
  }
</style>
<script>
(function(){
  var PASS = 'futurerays';
  var KEY = 'fr_oci_v2_auth';
  if(sessionStorage.getItem(KEY) !== '1'){
    var ok = false;
    while(!ok){
      var input = window.prompt('\uD83D\uDD10 FutureRays社内用\nパスワードを入力してください');
      if(input === null){ document.body.innerHTML='<h2 style=text-align:center;margin-top:40vh>アクセスが拒否されました</h2>'; break; }
      if(input === PASS){ sessionStorage.setItem(KEY,'1'); ok=true; }
      else{ window.alert('パスワードが違います。再入力してください。'); }
    }
  }
})();
</script>
</head>
<body>


<div class="header">
  <div class="header-left">
    <span class="header-logo">FR</span>
    <span class="header-title">OCI Foundations Vol.2</span>
  </div>
  <div class="header-right">
    <span class="badge-cat" id="headerCat">1Z0-1085-25</span>
    <span class="progress-text" id="headerProg"></span>
  </div>
</div>

<div class="main" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ===== QUIZ DATA =====
const QUESTIONS = [{"id": 1, "question": "OCI のサービス・ゲートウェイで「Oracle Services Network」ラベルを選択した場合にアクセスできるサービスはどれですか？（2 つ選択）", "options": {"A": "オブジェクト・ストレージ", "B": "インターネット上の任意のエンドポイント", "C": "Oracle Autonomous Database", "D": "オンプレミスのデータベース", "E": "他のリージョンのVCN"}, "answer": ["A", "C"], "explanation": "サービス・ゲートウェイは Oracle Services Network（OSN）上のサービスへのプライベート接続を提供します。OSN には OCI オブジェクト・ストレージや Autonomous Database などの Oracle マネージドサービスが含まれます。インターネット上の任意のエンドポイントは IGW や NAT GW の役割です。", "category": "ネットワーク"}, {"id": 2, "question": "VCN ピアリングに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "ローカル VCN ピアリング（LPG）は同一リージョン内の 2 つの VCN を接続する。", "B": "リモート VCN ピアリングは LPG を使用して異なるリージョン間を接続する。", "C": "ピアリングされた VCN の CIDR は重複していても通信できる。", "D": "リモート VCN ピアリングには DRG と RPC（リモート・ピアリング接続）が必要。", "E": "ローカルピアリングは同一テナンシ内の VCN 間のみ使用できる。"}, "answer": ["A", "D"], "explanation": "A) 正解。LPG は同一リージョン内の VCN 間をプライベートに接続します。 D) 正解。リモート VCN ピアリングは DRG に RPC をアタッチして実現します。 B) 誤り。リモートピアリングは LPG ではなく DRG を使います。 C) 誤り。ピアリングする VCN の CIDR は重複してはいけません。 E) 誤り。異なるテナンシの VCN 間でもピアリング可能です。", "category": "ネットワーク"}, {"id": 3, "question": "OCI DNS サービスに関する正しい説明はどれですか？", "options": {"A": "OCI DNS はパブリックゾーンのみサポートし、プライベートゾーンはサポートしない。", "B": "プライベート DNS ゾーンは VCN 内のリソースのみが名前解決できる。", "C": "トラフィック管理ポリシーを使用するとヘルスチェックに基づいたフェイルオーバーが可能。", "D": "OCI DNS はオンプレミスのDNSと統合できない。", "E": "DNS ゾーンを削除すると内包するレコードは自動的に別ゾーンに移行される。"}, "answer": ["C"], "explanation": "C) 正解。トラフィック管理ポリシーにはヘルスチェック連動のフェイルオーバー、地理ベースルーティング、重み付けルーティングなどが含まれます。 A) 誤り。OCI DNS はパブリック・プライベート両方のゾーンをサポートします。 B) 部分的に正しいですが、プライベートゾーンは VCN に関連付けられており、そのVCN内のリソースが解決できます。 D) 誤り。DNS リゾルバー・エンドポイントを使ってオンプレミスと統合できます。", "category": "ネットワーク"}, {"id": 4, "question": "OCI ネットワーク・ファイアウォールに関する正しい説明はどれですか？", "options": {"A": "ネットワーク・ファイアウォールはセキュリティ・リストの上位互換であり、サブネット単位で自動適用される。", "B": "ネットワーク・ファイアウォールはレイヤー7（アプリケーション層）のトラフィック検査が可能。", "C": "ネットワーク・ファイアウォールは OCI が無料で提供するサービスである。", "D": "ネットワーク・ファイアウォールは VCN 外部からのトラフィックのみ検査できる。", "E": "ネットワーク・ファイアウォールは既存のセキュリティ・リストを自動的に置き換える。"}, "answer": ["B"], "explanation": "B) 正解。OCI ネットワーク・ファイアウォールは Palo Alto Networks 技術をベースにした次世代ファイアウォールで、L7 の侵入検知・防御（IDS/IPS）、URL フィルタリング、SSL インスペクションが可能です。 A) 誤り。セキュリティ・リストとは別のサービスで、ルート表経由でトラフィックを誘導して使います。 C) 誤り。有料サービスです。", "category": "ネットワーク"}, {"id": 5, "question": "OCI Bastion サービスに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "Bastion は SSH ポート（22番）へのアクセスを不要にするサービスである。", "B": "Bastion はパブリック IP を持たないプライベートなリソースへの安全な SSH/RDP アクセスを提供する。", "C": "Bastion セッションには有効期限があり、永続的なセッションは作成できない。", "D": "Bastion を使用するにはターゲットのインスタンスに Oracle Cloud Agent が不要である。", "E": "Bastion はインターネット経由でのアクセスのため、公開 IP アドレスが必要。"}, "answer": ["B", "C"], "explanation": "B) 正解。Bastion はパブリック IP なしのプライベートインスタンスへのゼロトラストアクセスを実現します。 C) 正解。セッションには最大有効期限（デフォルト3時間、最大180時間）があります。 A) 誤り。SSH ポートは引き続き使います。Bastion がゲートウェイ役を果たします。 D) 誤り。マネージドSSHセッションには Oracle Cloud Agent が必要です。 E) 誤り。Bastion 自体はフルマネージドで、ユーザーはパブリック IP を管理しません。", "category": "セキュリティ"}, {"id": 6, "question": "OCI WAF（Web Application Firewall）に関する正しい説明はどれですか？", "options": {"A": "WAF は L3/L4 レベルのファイアウォールであり、HTTP リクエストの内容は検査しない。", "B": "WAF はロード・バランサに直接統合されており、別途設定は不要。", "C": "WAF の保護ルールには OWASPのルールセットが含まれる。", "D": "WAF はオンプレミスのアプリケーションには適用できない。", "E": "WAF はブロック・モードのみで動作し、検出のみのモードはない。"}, "answer": ["C"], "explanation": "C) 正解。OCI WAF には OWASP Top 10 に対応したルールセットが含まれており、SQLインジェクション・XSS等のL7攻撃を検知・ブロックします。 A) 誤り。WAF は HTTP/HTTPS を検査するL7サービスです。 B) 誤り。WAF は別途設定が必要です。 D) 誤り。オリジンとして任意のIPを指定できるため、オンプレミスにも適用可能です。 E) 誤り。検出（Detection）モードとブロック（Protection）モードの両方があります。", "category": "セキュリティ"}, {"id": 7, "question": "OCI コンピュートのインスタンス・メタデータ・サービス（IMDS）に関する正しい説明はどれですか？", "options": {"A": "IMDS にアクセスするには IAM ポリシーが必要。", "B": "IMDS v2 はリクエストに TTL 付きトークンが必要で、SSRF 攻撃への耐性が高い。", "C": "IMDS はインターネット経由でのみアクセスできる。", "D": "IMDS v1 と v2 は同時に無効化できない。", "E": "IMDS にはインスタンスの課金情報が含まれる。"}, "answer": ["B"], "explanation": "B) 正解。IMDS v2 はセッション指向の認証（TTL 付きトークン）を採用しており、SSRF（サーバーサイドリクエストフォージェリ）攻撃への耐性が v1 より高いです。 A) 誤り。IMDS はインスタンス内部からの HTTP リクエストで IAM 認証不要でアクセスできます（169.254.169.254）。 C) 誤り。IMDS はリンクローカルアドレスによるインスタンス内部からのアクセスです。", "category": "コンピュート"}, {"id": 8, "question": "OCI ブート・ボリュームに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "ブート・ボリュームはインスタンス削除時に必ず一緒に削除される。", "B": "ブート・ボリュームはインスタンス終了後も保持でき、新しいインスタンスのブートソースとして使用できる。", "C": "ブート・ボリュームのクロスリージョン・レプリケーションはサポートされていない。", "D": "ブート・ボリュームをデタッチして別インスタンスにデータディスクとしてアタッチできる。", "E": "ブート・ボリュームのサイズはデフォルトで 200 GB 固定であり変更できない。"}, "answer": ["B", "D"], "explanation": "B) 正解。インスタンス削除時に「ブート・ボリュームを保持する」を選択でき、後から新インスタンスのカスタムイメージや起動源として利用できます。 D) 正解。ブート・ボリュームをデタッチして別インスタンスにデータディスクとしてアタッチすることでデータ移行が可能です。 A) 誤り。終了時に保持するか削除するかを選択できます。 C) 誤り。ブート・ボリュームもクロスリージョン・レプリケーションをサポートしています。 E) 誤り。デフォルトサイズは 50 GB（イメージによる）で、作成後に拡張できます。", "category": "コンピュート"}, {"id": 9, "question": "OCI オブジェクト・ストレージのマルチパート・アップロードに関する正しい説明はどれですか？", "options": {"A": "マルチパート・アップロードは 5 MB 未満のファイルに最適化された機能である。", "B": "マルチパート・アップロードは複数の部分（パーツ）を並列でアップロードして大容量オブジェクトを効率的に転送する。", "C": "マルチパート・アップロードが中断した場合、再開は不可能で最初からやり直す必要がある。", "D": "マルチパート・アップロードで使用する各パーツの最小サイズは 100 MB である。", "E": "マルチパート・アップロードはアーカイブ層のオブジェクトにのみ使用できる。"}, "answer": ["B"], "explanation": "B) 正解。マルチパート・アップロードは大容量オブジェクト（100 MB 以上が推奨）を複数パーツに分割し、並列アップロードすることで効率を高める機能です。 A) 誤り。小さなファイルには通常のアップロードが適しています。 C) 誤り。完了していないアップロードは一覧取得・再開が可能です（ただし未完了パーツはコスト発生）。 D) 誤り。最小パーツサイズは最後のパーツを除いて 10 MB です。", "category": "ストレージ"}, {"id": 10, "question": "OCI オブジェクト・ストレージのオブジェクト・バージョニングに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "バージョニングを有効にすると、上書き・削除されたオブジェクトの過去バージョンを保持できる。", "B": "バージョニングを有効にした後、無効に戻すことはできない。", "C": "バージョニングはバケット作成後でも有効化できる。", "D": "バージョニングが有効な場合、DELETE 操作でオブジェクトは即時物理削除される。", "E": "バージョニングを使用するには追加コストは一切かからない。"}, "answer": ["A", "C"], "explanation": "A) 正解。バージョニングにより上書き・削除前のオブジェクトが保持され、特定バージョンの取得・リストア・削除が可能です。 C) 正解。バケット作成後でもバージョニングの有効化ができます。 B) 誤り。バージョニングは一時停止（Suspend）できます。完全無効には戻せませんが停止は可能です。 D) 誤り。バージョニング有効時の DELETE は削除マーカーを作成します（物理削除ではありません）。 E) 誤り。保持されるバージョン分の追加ストレージコストが発生します。", "category": "ストレージ"}, {"id": 11, "question": "OCI ストレージ・ゲートウェイに関する正しい説明はどれですか？", "options": {"A": "ストレージ・ゲートウェイはオンプレミスの NFS/SMB マウントポイントとして OCI オブジェクト・ストレージへのアクセスを提供する。", "B": "ストレージ・ゲートウェイはブロック・ボリュームへのゲートウェイとして機能する。", "C": "ストレージ・ゲートウェイはパブリックインターネット経由でのみ接続できる。", "D": "ストレージ・ゲートウェイは OCI 上の VM としてのみデプロイできる。", "E": "ストレージ・ゲートウェイは最大 1 GB のファイルしか転送できない。"}, "answer": ["A"], "explanation": "A) 正解。OCI ストレージ・ゲートウェイはオンプレミスから NFS マウントポイント経由で OCI オブジェクト・ストレージにアクセスできるアプライアンスです。既存のファイルベースのワークフローを変更せずにクラウドへ移行できます。 B) 誤り。オブジェクト・ストレージへのゲートウェイです。 D) 誤り。オンプレミス環境（VMware等）または OCI 上にデプロイできます。", "category": "ストレージ"}, {"id": 12, "question": "OCI Identity Domain（アイデンティティ・ドメイン）に関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "アイデンティティ・ドメインは IAM の拡張機能で、ユーザー・グループ・アプリケーションの統合管理に使用する。", "B": "アイデンティティ・ドメインは OCI テナンシ内に 1 つしか作成できない。", "C": "アイデンティティ・ドメインを使用すると Social Identity Provider（Google・Facebook等）との連携が可能。", "D": "アイデンティティ・ドメインはコンパートメントに依存する概念であり、ルートのみに作成できる。", "E": "デフォルト・アイデンティティ・ドメインは削除可能である。"}, "answer": ["A", "C"], "explanation": "A) 正解。アイデンティティ・ドメインは IAM の管理単位で、ユーザー・グループ・ポリシー・OAuth アプリ等を統合管理します。 C) 正解。Social IdP 連携（Google・Facebook・GitHub等）と SAML/OIDC IdP との統合が可能です。 B) 誤り。テナンシ内に複数のアイデンティティ・ドメインを作成できます。 D) 誤り。ルート以外のコンパートメントにも作成できます。 E) 誤り。デフォルト・ドメインは削除できません。", "category": "IAM"}, {"id": 13, "question": "OCI の SCIM（System for Cross-domain Identity Management）プロビジョニングに関する正しい説明はどれですか？", "options": {"A": "SCIM は OCI オブジェクト・ストレージへのアクセスを管理するプロトコルである。", "B": "SCIM を使用すると外部 IdP（Microsoft Entra ID 等）からユーザーを OCI に自動プロビジョニングできる。", "C": "SCIM プロビジョニングはパスワードの同期のみを行い、グループの同期はできない。", "D": "SCIM は OCI でサポートされていないため、手動でユーザー作成が必要。", "E": "SCIM プロビジョニングを使用するには Oracle Support に申請が必要。"}, "answer": ["B"], "explanation": "B) 正解。SCIM プロビジョニングにより、Microsoft Entra ID（旧 Azure AD）や Okta 等の外部 IdP でユーザー・グループを管理し、OCI へ自動同期（プロビジョニング・デプロビジョニング）できます。 A) 誤り。SCIM はユーザー管理のプロトコルです。 C) 誤り。ユーザーとグループの両方を同期します。 D) 誤り。OCI Identity Domains は SCIM 2.0 をサポートしています。", "category": "IAM"}, {"id": 14, "question": "OCI のリソース・プリンシパルに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "リソース・プリンシパルは OCI Functions やコンテナ・インスタンスなどのサービスが API キーなしで OCI にアクセスするために使用する。", "B": "リソース・プリンシパルを使うにはインスタンスに SSH キーペアを設定する必要がある。", "C": "リソース・プリンシパルはインスタンス・プリンシパルの概念を Functions 等に拡張したもの。", "D": "リソース・プリンシパルは同一テナンシ内のリソースとのやり取りにのみ使用できる。", "E": "リソース・プリンシパルは手動でローテーションするキーの管理が必要。"}, "answer": ["A", "C"], "explanation": "A) 正解。リソース・プリンシパルにより、Functions・コンテナ等が API キーや認証トークンなしで OCI サービスを呼び出せます。 C) 正解。インスタンス・プリンシパル（EC2 に相当）をコンテナ・Functions 等に拡張した概念がリソース・プリンシパルです。 B) 誤り。SSH キーは不要です。 D) 誤り。クロステナンシの操作もポリシーによって許可できます。 E) 誤り。キー管理は Oracle が自動的に行います。", "category": "IAM"}, {"id": 15, "question": "OCI Audit サービスに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "Audit はすべての API 呼び出しを自動で記録し、無効化できない。", "B": "Audit ログのデフォルト保持期間は 90 日間である。", "C": "Audit ログは Object Storage にエクスポートして長期保存できる。", "D": "Audit はコンソール操作のみ記録し、CLI・API からの操作は記録しない。", "E": "Audit の保持期間は最長 1 年であり変更できない。"}, "answer": ["A", "C"], "explanation": "A) 正解。OCI Audit はすべての API 呼び出しを自動で記録します。これは無効化できません（セキュリティ要件）。 C) 正解。Audit ログはサービス・コネクターを通じて Object Storage や Streaming にエクスポートして長期保存できます。 B) 誤り。デフォルト保持期間は 90 日です（この記述は正しいですが設問では A・C が正解）。 D) 誤り。コンソール・CLI・SDK・API すべての操作が記録されます。 E) 誤り。エクスポートにより実質的に無期限保存が可能です。", "category": "ガバナンスと管理"}, {"id": 16, "question": "OCI Logging サービスに関する正しい説明はどれですか？", "options": {"A": "Logging は VCN フロー・ログや Object Storage アクセス・ログなどのリソース・ログを収集できる。", "B": "Logging はカスタムアプリケーションのログを取り込めない（OCI リソースのログのみ）。", "C": "Logging は最大 7 日間しかログを保持できない。", "D": "Logging にはアラート機能が組み込まれており、メールで通知できる。", "E": "Logging は東京リージョンではサポートされていない。"}, "answer": ["A"], "explanation": "A) 正解。OCI Logging は VCN フロー・ログ・Object Storage アクセス・ログ・Load Balancer アクセス・ログなど多種のリソース・ログに加え、カスタム・ログ（アプリケーション独自のログ）も収集できます。 B) 誤り。OCI Logging Agent を使うとカスタムアプリのログも取り込めます。 C) 誤り。Logging のデフォルト保持は 30 日で、カスタマイズ可能です。 D) 誤り。アラート機能は Events サービスや Monitoring と組み合わせて実現します。", "category": "ガバナンスと管理"}, {"id": 17, "question": "OCI Monitoring サービスとアラームに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "アラームは Notifications サービスと連携してメール・Slack・PagerDuty へ通知を送れる。", "B": "Monitoring のメトリクスは OCI コンソールにのみ表示でき、API での取得はできない。", "C": "アラームはステートレスモードとステートフルモードを選択できる。", "D": "Monitoring サービスのメトリクスはデフォルトで永久保存される。", "E": "カスタム・メトリクスを発行するには Oracle Support への申請が必要。"}, "answer": ["A", "C"], "explanation": "A) 正解。アラームは Notifications トピックに接続してメール・Slack Webhook・PagerDuty・Functions 等へ通知できます。 C) 正解。ステートレスモードでは条件を満たすたびに通知、ステートフルモードでは状態変化時のみ通知します。 B) 誤り。Monitoring API でメトリクスを取得できます。 D) 誤り。メトリクスの保持期間は 90 日（高解像度は 7 日）です。 E) 誤り。カスタム・メトリクスは API や SDK から自由に発行できます。", "category": "ガバナンスと管理"}, {"id": 18, "question": "OCI コスト管理ツール「コスト分析」と「コスト・エスティメーター」の違いとして正しいものはどれですか？", "options": {"A": "コスト分析は過去の実際の使用コストを可視化し、コスト・エスティメーターは将来のコストを見積もる。", "B": "コスト分析はリアルタイムのコストを分析し、コスト・エスティメーターは過去のコストを比較する。", "C": "コスト・エスティメーターはサポート費用の計算に特化したツールである。", "D": "コスト分析は無料トライアル期間中のみ使用できる。", "E": "両ツールは同じ機能を提供する別名のサービスである。"}, "answer": ["A"], "explanation": "A) 正解。コスト分析（Cost Analysis）はテナンシの過去・現在の使用状況を可視化するツールです。コスト・エスティメーター（Cost Estimator）は OCI の利用構成を入力して利用前にコストを見積もるツールです。この 2 つは用途が異なります。", "category": "ガバナンスと管理"}, {"id": 19, "question": "OCI のアーキテクチャ設計原則として「高可用性」を実現するために推奨される構成はどれですか？（2 つ選択）", "options": {"A": "単一の AD にすべてのリソースを集中配置する。", "B": "複数のフォルト・ドメイン（FD）にインスタンスを分散する。", "C": "シングル AD リージョンでは AD 障害時の復旧に別リージョンを活用する。", "D": "ロード・バランサを 1 台のみ使用してコストを最小化する。", "E": "すべてのデータをローカルディスクのみに保存する。"}, "answer": ["B", "C"], "explanation": "B) 正解。FD 間にインスタンスを分散することで同一 AD 内のハードウェア障害時の影響を最小化します。 C) 正解。東京・大阪のようにシングル AD リージョンでは AD 障害=リージョン障害に相当するため、別リージョンへのディザスタリカバリ構成が推奨されます。 A) 誤り。単一 AD への集中は高可用性の逆です。 D) 誤り。ロード・バランサも冗長化が推奨されます（OCI LB はデフォルトで冗長構成）。 E) 誤り。ブロック・ボリュームやオブジェクト・ストレージに保存することが推奨されます。", "category": "アーキテクチャ"}, {"id": 20, "question": "OCI のデータ所在地（Data Residency）と主権に関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "OCI ではデータが別のリージョンに自動的に複製されることはなく、ユーザーが選択したリージョン内にとどまる。", "B": "OCI の専用リージョン（Dedicated Region）は顧客のデータセンターに OCI を展開しデータを完全に顧客サイト内に保持できる。", "C": "マルチリージョン・バックアップは OCI が自動的に実施するためユーザーの設定は不要。", "D": "日本国内でデータ所在地要件を満たすには必ず海外リージョンも使う必要がある。", "E": "OCI コンプライアンス要件はすべて OCI が責任を持ち、顧客は一切の設定が不要。"}, "answer": ["A", "B"], "explanation": "A) 正解。OCI はユーザーが選択したリージョン外にデータを自動移動しません。データ所在地の管理はユーザーにあります。 B) 正解。専用リージョンにより、顧客サイト内に OCI インフラを設置しデータ主権を完全にコントロールできます。 C) 誤り。クロスリージョン・バックアップはユーザーが明示的に設定する必要があります。 D) 誤り。東京・大阪リージョンを使えば日本国内のデータ所在地要件を満たせます。 E) 誤り。責任共有モデルのもと、セキュリティ設定・データ保護はユーザーの責任範囲が存在します。", "category": "アーキテクチャ"}, {"id": 21, "question": "OCI Streaming サービスに関する正しい説明はどれですか？", "options": {"A": "OCI Streaming は Apache Kafka 互換の API を提供しており、既存の Kafka クライアントをそのまま利用できる。", "B": "OCI Streaming はリアルタイム動画のトランスコーディングに特化したサービスである。", "C": "OCI Streaming のメッセージ保持期間は最大 1 時間のみである。", "D": "OCI Streaming はプル型のみで、プッシュ型の配信はできない。", "E": "OCI Streaming は 1 MB 未満のメッセージには対応していない。"}, "answer": ["A"], "explanation": "A) 正解。OCI Streaming は Apache Kafka 互換の API を提供しており、既存の Kafka プロデューサー・コンシューマーをコード変更なしで利用できます。大規模データのリアルタイム取り込みや分析パイプラインに使われます。 B) 誤り。動画トランスコーディングとは無関係のメッセージストリーミングサービスです。 C) 誤り。メッセージ保持期間は最大 7 日（168 時間）です。", "category": "アーキテクチャ"}, {"id": 22, "question": "OCI Events サービスに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "Events はリソースの状態変化（インスタンス起動・オブジェクトアップロード等）をトリガーにアクションを実行できる。", "B": "Events のアクションターゲットには Functions・Streaming・Notifications が含まれる。", "C": "Events は定期的（スケジュール）なトリガーに対応しており、Cron ジョブの代替として使用できる。", "D": "Events は OCI コンソール操作のみ対応し、API からのリソース変更は検知できない。", "E": "Events ルールに設定できる条件はリソースタイプのみで、詳細なフィルタリングはできない。"}, "answer": ["A", "B"], "explanation": "A) 正解。Events はリソースの状態変化（CloudEvent）を検知してアクションを自動実行するサービスです。 B) 正解。アクションターゲットとして Functions・Streaming（Kafka互換）・Notifications（メール等）を指定できます。 C) 誤り。Events はイベント駆動です。スケジュール実行には Scheduler または Resource Scheduler を使います。 D) 誤り。コンソール・API・CLI すべてのリソース変更を検知します。 E) 誤り。リソースタイプ・操作タイプ・条件（属性フィルタ）を組み合わせてルールを設定できます。", "category": "アーキテクチャ"}, {"id": 23, "question": "OCI Notifications（通知）サービスに関する正しい説明はどれですか？", "options": {"A": "Notifications は SMS 通知のみサポートし、メールはサポートしていない。", "B": "Notifications はトピックとサブスクリプションで構成され、複数のエンドポイントに同時通知できる。", "C": "Notifications を使用するには月額固定費用が必要。", "D": "Notifications のメッセージサイズは最大 1 KB に制限されている。", "E": "Notifications は OCI コンソールからのみ設定でき、API には対応していない。"}, "answer": ["B"], "explanation": "B) 正解。OCI Notifications はトピックにサブスクリプションを追加することで、メール・HTTPS・Slack・PagerDuty・Functions など複数のエンドポイントに同時通知できます。 A) 誤り。メール・SMS・HTTPS・Functions など多様なサブスクリプション先をサポートしています。 C) 誤り。Notifications はメッセージ数に応じた従量課金で、無料枠もあります。 D) 誤り。メッセージサイズの上限は 64 KB です。", "category": "ガバナンスと管理"}, {"id": 24, "question": "OCI Always Free（常時無料）リソースに含まれるものはどれですか？（2 つ選択）", "options": {"A": "2 つの AMD Micro インスタンス（1/8 OCPU・1 GB RAM）", "B": "マルチ AD 構成の 3 つの Flex インスタンス", "C": "20 GB のブート・ボリューム×2", "D": "10 GB のオブジェクト・ストレージ", "E": "1 TB の FastConnect 専用回線"}, "answer": ["A", "C"], "explanation": "A) 正解。Always Free コンピュートには AMD E2.1.Micro 相当（1/8 OCPU・1 GB RAM）が 2 台含まれます。 C) 正解。各 Micro インスタンスに 50 GB のブート・ボリュームが付与されます（合計 100 GB、問題では 20 GB×2 と記載しましたが実際は 50 GB×2）。なお Always Free には 10 GB のオブジェクト・ストレージも含まれます（D も一部正しい内容ですが、この設問では A・C が主要な正解として設定しています）。 B) 誤り。Always Free の Flex インスタンスはありません（無料トライアルの Ampere とは別）。 E) 誤り。FastConnect は Always Free 対象外です。", "category": "ガバナンスと管理"}, {"id": 25, "question": "OCI のサービス・レベル・アグリーメント（SLA）に関する正しい説明はどれですか？", "options": {"A": "OCI のすべてのサービスで 99.999%（Five Nines）の可用性が保証されている。", "B": "SLA はサービスによって異なり、例えばコンピュートの可用性 SLA はマルチ AD 構成で 99.99% となる場合がある。", "C": "SLA 違反があっても補償（クレジット）は提供されない。", "D": "SLA の対象はコンソール操作のみで、API は対象外である。", "E": "シングル AD リージョンではいかなる SLA も保証されない。"}, "answer": ["B"], "explanation": "B) 正解。OCI の SLA はサービスとデプロイメント構成によって異なります。コンピュートではマルチ AD 構成（複数 FD や AD に分散）で高い SLA（99.99%等）が提供されます。 A) 誤り。すべてのサービスで Five Nines が保証されているわけではありません。 C) 誤り。SLA 違反時はサービス・クレジットが提供されます。 E) 誤り。シングル AD リージョンでも SLA は提供されます。", "category": "アーキテクチャ"}, {"id": 26, "question": "OCI Data Safe に関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "Data Safe はデータベースのセキュリティ評価・ユーザーアセスメント・データ・マスキングを提供する。", "B": "Data Safe は Oracle Database 以外のデータベース（MySQL・PostgreSQL等）には対応していない。", "C": "Data Safe の監査データ収集機能によりデータベース操作の監査ログを収集できる。", "D": "Data Safe は OCI 上のデータベースにのみ対応し、オンプレミスDBには使用できない。", "E": "Data Safe は追加コスト不要で全テナンシに自動有効化される。"}, "answer": ["A", "C"], "explanation": "A) 正解。Data Safe はセキュリティ評価（設定の脆弱性検出）・ユーザーアセスメント・機密データ検出・データ・マスキング・監査を統合提供します。 C) 正解。Activity Auditing 機能でデータベースへのアクセス・操作ログを収集できます。 B) 誤り。Oracle Database 以外（MySQL HeatWave 等）にも対応しています。 D) 誤り。オンプレミスの Oracle Database にも接続できます。 E) 誤り。Data Safe は有効化が必要で、一部機能は無料枠内、高度機能は有料です。", "category": "セキュリティ"}, {"id": 27, "question": "OCI のコンプライアンスと責任共有モデルに関する正しい説明はどれですか？", "options": {"A": "責任共有モデルでは OCI がすべてのセキュリティ責任を負い、顧客は何もしなくてよい。", "B": "OCI はクラウドの物理インフラ・ハイパーバイザーのセキュリティに責任を持ち、顧客はその上のOS・アプリ・データのセキュリティに責任を持つ。", "C": "SaaS サービスを利用する場合、顧客はゲスト OS のパッチ適用に責任がある。", "D": "コンプライアンス認証（ISO 27001・SOC 2等）は顧客が個別に取得する必要があり、OCI の認証は顧客に引き継がれない。", "E": "責任共有モデルはすべてのクラウドサービスタイプ（IaaS・PaaS・SaaS）で同一内容となる。"}, "answer": ["B"], "explanation": "B) 正解。OCI の責任共有モデルでは、OCI が物理データセンター・ネットワーク・ハイパーバイザー等のクラウドセキュリティに責任を持ち、顧客は OS・ミドルウェア・アプリケーション・データ・IAM 設定等に責任を持ちます。 A) 誤り。顧客側にも責任範囲があります。 C) 誤り。SaaS ではゲスト OS 管理は OCI/プロバイダーの責任です。 E) 誤り。IaaS・PaaS・SaaS で顧客の責任範囲は異なります（IaaS が最も広い）。", "category": "アーキテクチャ"}, {"id": 28, "question": "OCI で「Oracle Interconnect for Microsoft Azure」を使用した場合の説明として正しいものはどれですか？", "options": {"A": "OCI と Azure のリソース間をインターネット経由で低レイテンシ接続する。", "B": "OCI と Azure のリソース間をプライベートな専用接続で低レイテンシかつ高帯域で接続できる。", "C": "この接続は OCI オブジェクト・ストレージと Azure Blob Storage 間のデータ同期専用サービスである。", "D": "この機能は将来提供予定であり、2026 年現在まだ利用できない。", "E": "OCI と Azure の両方でデータ転送料金がそれぞれ通常料金でかかる。"}, "answer": ["B"], "explanation": "B) 正解。Oracle Interconnect for Microsoft Azure は東京・大阪を含む主要拠点で OCI と Azure をプライベート専用接続でつなぎ、低レイテンシ・高帯域のマルチクラウド構成を実現します。データ転送コストも優遇されます。 A) 誤り。インターネット経由ではなくプライベート接続です。 C) 誤り。ストレージ間のデータ同期専用ではなく、汎用のネットワーク接続です。 E) 誤り。マルチクラウド接続での通信コストは優遇されています。", "category": "アーキテクチャ"}, {"id": 29, "question": "OCI の「サービス・メッシュ」（OCI Service Mesh）に関する正しい説明はどれですか？", "options": {"A": "サービス・メッシュは仮想マシンのメッシュネットワークを管理するためのサービスである。", "B": "サービス・メッシュはマイクロサービス間のトラフィック管理・観測・セキュリティをサイドカー・プロキシで実現する。", "C": "OCI Service Mesh は OCI Kubernetes Engine（OKE）では使用できない。", "D": "サービス・メッシュを使用するとアプリケーションコードの変更が必須となる。", "E": "サービス・メッシュは VCN のセキュリティ・リストを自動的に設定する機能である。"}, "answer": ["B"], "explanation": "B) 正解。OCI Service Mesh は Envoy ベースのサイドカー・プロキシを各 Pod に注入することで、マイクロサービス間の mTLS 通信・トラフィック管理（重み付けルーティング等）・テレメトリ収集をアプリケーション側の変更なしに実現します。 A) 誤り。仮想マシンではなくマイクロサービス（主に Kubernetes）向けのサービスです。 C) 誤り。OKE と統合して使用します。 D) 誤り。サイドカー方式のためアプリコードの変更は不要です。", "category": "コンピュート"}, {"id": 30, "question": "OCI GenAI（生成 AI）サービスに関する正しい説明はどれですか？（2 つ選択）", "options": {"A": "OCI Generative AI はサーバーレスの推論エンドポイントと専用クラスターの両方を選択できる。", "B": "OCI Generative AI で提供されるモデルは Oracle が独自開発したモデルのみである。", "C": "OCI Generative AI はテキスト生成・テキスト埋め込み・要約・チャットなど複数のユースケースをサポートする。", "D": "OCI Generative AI を使用するには別途 GPU インスタンスを自分で調達する必要がある。", "E": "OCI Generative AI は東京リージョンでは利用できない。"}, "answer": ["A", "C"], "explanation": "A) 正解。OCI Generative AI では共有インフラ上で使うサーバーレス（オンデマンド）と専用 GPU クラスター上で実行する専用ホスティングを選択できます。 C) 正解。テキスト生成・テキスト埋め込み（Embeddings）・要約・チャットなど複数のモードをサポートします。 B) 誤り。Cohere・Meta（Llama）などサードパーティのモデルも提供しています。 D) 誤り。マネージドサービスのため GPU の調達・管理は不要です。 E) 確認が必要ですが、OCI Generative AI は複数リージョンで展開が進んでいます。", "category": "アーキテクチャ"}];

// ===== STATE =====
let state = {
  screen: 'start',      // start | quiz | score
  mode: 'all',          // all | wrong
  filterCats: [],       // [] = all categories
  queue: [],            // question indices
  current: 0,
  selected: [],         // currently selected option keys
  answered: false,
  results: [],          // {id, correct, selected, answer}
  wrongIds: [],
};

const CAT_ICONS = {
  'IAM': '🔐',
  'ネットワーク': '🌐',
  'コンピュート': '💻',
  'ストレージ': '💾',
  'アーキテクチャ': '🏗️',
  'セキュリティ': '🛡️',
  'ガバナンスと管理': '⚙️',
  'ガバナンス': '⚙️',
  'その他': '📋',
};

const ALL_CATS = [...new Set(QUESTIONS.map(q => q.category))];

// カテゴリ別問題数
const catCounts = {};
ALL_CATS.forEach(c => { catCounts[c] = QUESTIONS.filter(q => q.category === c).length; });

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toast(msg, duration = 1800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ===== BUILD QUEUE =====
function buildQueue() {
  let pool = QUESTIONS.filter(q => {
    if (state.filterCats.length > 0 && !state.filterCats.includes(q.category)) return false;
    if (state.mode === 'wrong' && !state.wrongIds.includes(q.id)) return false;
    return true;
  });
  state.queue = shuffle(pool.map(q => q.id));
  state.current = 0;
  state.results = [];
  state.selected = [];
  state.answered = false;
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  const prog = document.getElementById('headerProg');
  const catBadge = document.getElementById('headerCat');

  if (state.screen === 'start') {
    prog.textContent = '';
    catBadge.textContent = '1Z0-1085-25';
    app.innerHTML = renderStart();
  } else if (state.screen === 'quiz') {
    const total = state.queue.length;
    prog.textContent = (state.current + 1) + ' / ' + total;
    catBadge.textContent = state.filterCats.length === 0 ? '全カテゴリ' : state.filterCats.join('・');
    app.innerHTML = renderQuiz();
    bindQuizEvents();
  } else if (state.screen === 'score') {
    prog.textContent = '';
    catBadge.textContent = '結果';
    app.innerHTML = renderScore();
  }
}

// ===== START SCREEN =====
function renderStart() {
  const wrongCount = state.wrongIds.length;
  let catCards = ALL_CATS.map(cat => {
    const sel = state.filterCats.includes(cat);
    return `<div class="cat-card${sel?' selected':''}" onclick="toggleCat('${cat}')">
      <div class="cat-icon">${CAT_ICONS[cat]||'📋'}</div>
      <div class="cat-name">${cat}</div>
      <div class="cat-count">${catCounts[cat]}問</div>
    </div>`;
  }).join('');

  const totalFiltered = state.filterCats.length === 0
    ? QUESTIONS.length
    : QUESTIONS.filter(q => state.filterCats.includes(q.category)).length;

  return `<div class="start-screen">
    <div class="start-icon">☁️</div>
    <h1>OCI Foundations Vol.2</h1>
    <p>1Z0-1085-25 公式模擬問題集<br>全 ${QUESTIONS.length}問 ／ ネットワーク・セキュリティ・IAM・ストレージ・ガバナンス</p>

    <div style="width:100%;max-width:640px;text-align:left;margin-bottom:10px;">
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;">
        カテゴリを選択（未選択で全カテゴリ）
      </div>
      <div class="cat-grid">${catCards}</div>
    </div>

    <div style="width:100%;max-width:640px;text-align:left;margin-bottom:24px;">
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;">出題モード</div>
      <div class="mode-row">
        <button class="mode-btn${state.mode==='all'?' selected':''}" onclick="setMode('all')">🔀 シャッフル全問</button>
        <button class="mode-btn${state.mode==='wrong'?' selected':''}" onclick="setMode('wrong')"
          ${wrongCount===0?'disabled title="まだ不正解記録がありません"':''}>
          ❌ 間違いのみ再挑戦${wrongCount>0?' ('+wrongCount+'問)':''}
        </button>
      </div>
    </div>

    <button class="btn btn-primary" style="font-size:16px;padding:14px 48px;"
      onclick="startQuiz()">
      ▶ スタート（${totalFiltered}問）
    </button>
  </div>`;
}

function toggleCat(cat) {
  const idx = state.filterCats.indexOf(cat);
  if (idx >= 0) state.filterCats.splice(idx, 1);
  else state.filterCats.push(cat);
  render();
}

function setMode(mode) {
  state.mode = mode;
  render();
}

function startQuiz() {
  buildQueue();
  if (state.queue.length === 0) {
    toast('⚠️ 該当する問題がありません'); return;
  }
  state.screen = 'quiz';
  render();
}

// ===== QUIZ SCREEN =====
function currentQuestion() {
  return QUESTIONS.find(q => q.id === state.queue[state.current]);
}

function renderQuiz() {
  const q = currentQuestion();
  if (!q) return '';

  const total = state.queue.length;
  const pct = ((state.current) / total * 100).toFixed(1);
  const opts = Object.entries(q.options);
  const isMulti = q.answer.length > 1;
  const hint = isMulti ? `${q.answer.length}つ選択` : '1つ選択';

  let optHtml = opts.map(([key, text]) => {
    let cls = 'opt';
    let icon = key;
    if (state.answered) {
      const isCorrectKey = q.answer.includes(key);
      const isSelected = state.selected.includes(key);
      if (isSelected && isCorrectKey) cls += ' correct';
      else if (isSelected && !isCorrectKey) cls += ' wrong';
      else if (!isSelected && isCorrectKey) cls += ' answer-highlight';
    } else {
      if (state.selected.includes(key)) cls += ' checked';
    }
    return `<button class="${cls}" onclick="selectOpt('${key}')" ${state.answered?'disabled':''}>
      <span class="opt-key">${key}</span>
      <span class="opt-text">${esc(text)}</span>
    </button>`;
  }).join('');

  // result badge
  let resultHtml = '';
  if (state.answered) {
    const correct = q.answer.every(k => state.selected.includes(k)) && state.selected.length === q.answer.length;
    resultHtml = correct
      ? `<div class="result-badge ok show">✅ 正解！</div>`
      : `<div class="result-badge ng show">❌ 不正解　正解: ${q.answer.join('・')}</div>`;
  }

  // explanation
  const expHtml = `<div class="explanation${state.answered?' show':''}">
    <strong>解説</strong>${esc(q.explanation)}
  </div>`;

  // action buttons
  let actionHtml = '';
  if (!state.answered) {
    const canSubmit = state.selected.length > 0 && (isMulti ? state.selected.length === q.answer.length : true);
    actionHtml = `<div class="action-row">
      <button class="btn btn-primary" onclick="submitAnswer()" ${canSubmit?'':'disabled'}>
        ✔ 解答する${isMulti?' ('+state.selected.length+'/'+q.answer.length+')':''}
      </button>
      <button class="btn btn-ghost" onclick="skipQ()">スキップ →</button>
    </div>`;
  } else {
    const isLast = state.current >= total - 1;
    actionHtml = `<div class="action-row">
      ${isLast
        ? `<button class="btn btn-primary" onclick="showScore()">📊 結果を見る</button>`
        : `<button class="btn btn-primary" onclick="nextQ()">次の問題 →</button>`
      }
    </div>`;
  }

  return `
    <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">問 ${state.current + 1} / ${total}</span>
        <span class="q-cat-tag">${CAT_ICONS[q.category]||''} ${q.category}</span>
        <span class="q-select-hint">${hint}</span>
      </div>
      <div class="q-text">${esc(q.question)}</div>
      <div class="options">${optHtml}</div>
      ${resultHtml}
      ${expHtml}
      ${actionHtml}
    </div>`;
}

function esc(str) {
  return String(str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}

function bindQuizEvents() { /* event delegation already handled via onclick */ }

function selectOpt(key) {
  if (state.answered) return;
  const q = currentQuestion();
  const isMulti = q.answer.length > 1;
  if (isMulti) {
    const idx = state.selected.indexOf(key);
    if (idx >= 0) state.selected.splice(idx, 1);
    else state.selected.push(key);
  } else {
    state.selected = [key];
  }
  render();
}

function submitAnswer() {
  const q = currentQuestion();
  state.answered = true;
  const correct = q.answer.every(k => state.selected.includes(k)) && state.selected.length === q.answer.length;
  state.results.push({ id: q.id, correct, selected: [...state.selected], answer: [...q.answer] });
  if (!correct && !state.wrongIds.includes(q.id)) state.wrongIds.push(q.id);
  if (correct) state.wrongIds = state.wrongIds.filter(id => id !== q.id);
  render();
}

function skipQ() {
  const q = currentQuestion();
  state.results.push({ id: q.id, correct: false, selected: [], answer: [...q.answer], skipped: true });
  if (!state.wrongIds.includes(q.id)) state.wrongIds.push(q.id);
  nextQ();
}

function nextQ() {
  state.current++;
  state.selected = [];
  state.answered = false;
  if (state.current >= state.queue.length) showScore();
  else render();
}

function showScore() { state.screen = 'score'; render(); }

// ===== SCORE SCREEN =====
function renderScore() {
  const total = state.results.length;
  const correct = state.results.filter(r => r.correct).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const pass = pct >= 70;

  // カテゴリ別
  let catScoreHtml = ALL_CATS.map(cat => {
    const catQs = state.results.filter(r => {
      const q = QUESTIONS.find(q => q.id === r.id);
      return q && q.category === cat;
    });
    if (catQs.length === 0) return '';
    const catCorrect = catQs.filter(r => r.correct).length;
    const catPct = Math.round(catCorrect / catQs.length * 100);
    const barColor = catPct >= 70 ? 'var(--green)' : catPct >= 50 ? 'var(--amber)' : 'var(--red)';
    return `<div class="cat-score-card">
      <div class="cat-s-name">${CAT_ICONS[cat]||''} ${cat}</div>
      <div class="cat-s-val">${catCorrect}/${catQs.length} <span style="font-size:13px;color:var(--sub)">(${catPct}%)</span></div>
      <div class="cat-s-bar"><div class="cat-s-bar-fill" style="width:${catPct}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');

  // 不正解一覧
  const wrongResults = state.results.filter(r => !r.correct);
  let wrongListHtml = '';
  if (wrongResults.length > 0) {
    const items = wrongResults.map(r => {
      const q = QUESTIONS.find(q => q.id === r.id);
      const shortQ = q.question.length > 50 ? q.question.slice(0,50)+'…' : q.question;
      return `<div class="wrong-item">
        <span class="wi-num">問${q.id}</span>
        <span class="wi-q">${esc(shortQ)}</span>
      </div>`;
    }).join('');
    wrongListHtml = `<div class="wrong-list">
      <h3>❌ 不正解 ${wrongResults.length}問</h3>
      ${items}
    </div>`;
  }

  return `<div class="score-screen">
    <div class="score-ring ${pass?'pass':'fail'}">
      <div class="score-pct">${pct}%</div>
      <div class="score-label">${correct}/${total}問</div>
    </div>
    <h2>${pass ? '🎉 合格ライン達成！' : '📚 もう少し！'}</h2>
    <p>正解率 ${pct}%　（合格目安: 70%以上）<br>
    ${pass ? '素晴らしい結果です。試験に自信を持って臨みましょう！' : '不正解問題を中心に復習してもう一度挑戦しましょう。'}</p>

    <div class="cat-scores">${catScoreHtml}</div>
    ${wrongListHtml}

    <div class="action-row" style="justify-content:center;margin-top:28px;gap:12px;">
      ${wrongResults.length > 0
        ? `<button class="btn btn-primary" onclick="retryWrong()">❌ 不正解のみ再挑戦</button>`
        : ''
      }
      <button class="btn btn-secondary" onclick="goStart()">🏠 トップへ戻る</button>
      <button class="btn btn-ghost" onclick="retryAll()">🔁 同じ設定で再挑戦</button>
    </div>
  </div>`;
}

function retryWrong() {
  state.mode = 'wrong';
  state.filterCats = [];
  buildQueue();
  if (state.queue.length === 0) { toast('不正解問題がありません'); return; }
  state.screen = 'quiz';
  render();
}

function retryAll() {
  buildQueue();
  state.screen = 'quiz';
  render();
}

function goStart() {
  state.screen = 'start';
  render();
}

// ===== INIT =====
render();
</script>
</body>
</html>
